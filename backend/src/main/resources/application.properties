spring.application.name=gather-api

spring.datasource.url=jdbc:postgresql://localhost:5432/gather
spring.datasource.username=gather_user
spring.datasource.password=gather_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:gather-local-development-secret-key-change-before-deployment-2026}
app.jwt.expiration-minutes=60

spring.flyway.enabled=true

server.port=8080
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
