services:
  postgres:
    image: postgres:16
    container_name: gather-postgres
    environment:
      POSTGRES_DB: gather
      POSTGRES_USER: gather_user
      POSTGRES_PASSWORD: gather_password
    ports:
      - "5432:5432"
    volumes:
      - gather_postgres_data:/var/lib/postgresql/data

volumes:
  gather_postgres_data: